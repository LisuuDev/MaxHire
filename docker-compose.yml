version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: storemax
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./backend/baza.sql:/docker-entrypoint-initdb.d/storemax.sql:ro

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=storemax
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "5173:5173"
    extra_hosts:
      - "localhost:host-gateway"
    stdin_open: true
    depends_on:
      - backend